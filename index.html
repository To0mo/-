<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【100問ノック】歴史演習：近代日本とアジア（WW2前まで）</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #34495e;
            border-bottom: 4px solid #3498db;
            padding-bottom: 15px;
            font-size: 1.8em;
            margin-top: 0;
        }

        /* --- UI要素 --- */
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; color: #7f8c8d; font-size: 1.1em; }
        .progress-bar { width: 100%; background-color: #ecf0f1; height: 12px; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3498db, #9b59b6); width: 0%; transition: width 0.3s ease; }
        .type-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-size: 0.9em; margin-bottom: 20px; font-weight: bold; color: white; }

        /* --- 年表問題デザイン --- */
        .timeline-box { display: flex; align-items: stretch; background-color: #f8f9fa; border: 2px solid #bdc3c7; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .timeline-year { background-color: #34495e; color: white; width: 120px; display: flex; align-items: center; justify-content: center; font-size: 1.6em; font-weight: bold; flex-shrink: 0; padding: 15px; border-right: 2px solid #2c3e50; }
        .timeline-event { padding: 25px; font-size: 1.3em; font-weight: 600; color: #2c3e50; flex-grow: 1; display: flex; align-items: center; line-height: 1.5; }
        .blank-space { border-bottom: 3px solid #e74c3c; color: #e74c3c; padding: 0 8px; margin: 0 5px; font-style: italic; }

        @media (max-width: 650px) {
            .timeline-box { flex-direction: column; }
            .timeline-year { width: 100%; padding: 10px 0; border-right: none; border-bottom: 2px solid #2c3e50; }
        }

        /* --- 通常問題デザイン --- */
        .question-text { font-size: 1.4em; font-weight: bold; margin-bottom: 25px; color: #2c3e50; background-color: #f1f8ff; padding: 25px; border-left: 8px solid #3498db; border-radius: 4px; line-height: 1.5; white-space: pre-wrap; }

        /* --- 選択肢 --- */
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        /* 長文（並び替え・正誤問題）の場合は1列にする */
        .options.list-view { grid-template-columns: 1fr; }
        @media (max-width: 650px) { .options { grid-template-columns: 1fr; } }
        
        button.option-btn {
            padding: 18px; font-size: 1.15em; border: 2px solid #bdc3c7; background: white; border-radius: 10px;
            cursor: pointer; transition: all 0.2s; text-align: left; color: #34495e; font-weight: 600; line-height: 1.4; white-space: pre-wrap;
        }
        button.option-btn:hover:not(:disabled) { background-color: #ecf0f1; border-color: #3498db; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button.option-btn.correct { background-color: #d5f5e3; border-color: #2ecc71; color: #145a32; }
        button.option-btn.wrong { background-color: #fadbd8; border-color: #e74c3c; color: #7b241c; opacity: 0.8; }

        /* --- 解説とボタン --- */
        .explanation { margin-top: 30px; padding: 25px; background-color: #fff8e1; border-left: 6px solid #f1c40f; border-radius: 8px; display: none; animation: fadeIn 0.4s; }
        .explanation h3 { margin-top: 0; color: #d35400; border-bottom: 2px solid #fae5d3; padding-bottom: 8px; font-size: 1.2em; }
        .next-btn {
            display: block; width: 100%; padding: 20px; background-color: #3498db; color: white; border: none;
            border-radius: 10px; font-size: 1.3em; margin-top: 30px; cursor: pointer; display: none; font-weight: bold; box-shadow: 0 4px 0 #2980b9;
        }
        .next-btn:active { transform: translateY(4px); box-shadow: none; }
        .next-btn:hover { background-color: #2980b9; }

        /* --- 結果画面 --- */
        .result-screen { text-align: center; display: none; padding: 40px 20px; }
        .final-score { font-size: 5em; font-weight: 800; color: #3498db; margin: 20px 0; }
        .restart-btn { padding: 18px 50px; background-color: #27ae60; color: white; border: none; border-radius: 40px; font-size: 1.4em; cursor: pointer; font-weight: bold; box-shadow: 0 6px 15px rgba(39, 174, 96, 0.4); }
        .restart-btn:hover { background-color: #219150; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>歴史演習：近代日本とアジア（WW2前 100問）</h1>
    
    <div id="quiz-area">
        <div class="status-bar">
            <span id="question-count"></span>
            <span id="current-score"></span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div id="type-badge" class="type-badge"></div>

        <div id="timeline-box" class="timeline-box" style="display:none;">
            <div class="timeline-year" id="timeline-year"></div>
            <div class="timeline-event" id="timeline-event"></div>
        </div>

        <div id="normal-box" style="display:none;">
            <div id="question-text" class="question-text"></div>
        </div>

        <div id="options" class="options"></div>

        <div id="explanation" class="explanation">
            <h3>解説</h3>
            <p id="explanation-text"></p>
        </div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="result-screen" class="result-screen">
        <h2>全100問 終了！</h2>
        <p>あなたの最終スコア</p>
        <div class="final-score" id="final-score"></div>
        <p id="feedback-text" style="font-size: 1.3em; font-weight: bold; margin-bottom: 40px;"></p>
        <button class="restart-btn" onclick="resetQuiz()">シャッフルして再挑戦</button>
    </div>
</div>

<script>
    /* 
       type: "term"(用語), "year"(年号), "order"(並び替え), "tf"(正誤)
    */
    const masterData = [
        // ==========================================
        // 用語・人物問題 (約50問)
        // ==========================================
        { type: "term", a: "憲政党", opts: ["憲政党", "立憲政友会", "立憲改進党", "自由党"], vars: ["1898年、自由党と進歩党が合同して結成した政党は？", "【年表】1898年：日本最初の政党内閣の基盤となる（　）が結成された。"], exp: "板垣退助と大隈重信が協力しました（隈板内閣）。" },
        { type: "term", a: "軍部大臣現役武官制", opts: ["軍部大臣現役武官制", "文官任用令", "治安警察法", "徴兵令"], vars: ["第2次山県内閣が、軍部大臣を現役の大将・中将に限定した制度は？", "軍部の同意がなければ内閣を組織できなくなり、のちの軍部台頭の要因となった制度は？"], exp: "政党の力が軍に及ぶのを防ぐ目的で定められました。" },
        { type: "term", a: "立憲政友会", opts: ["立憲政友会", "憲政党", "大政翼賛会", "革新倶楽部"], vars: ["1900年、伊藤博文が議会運営を円滑にするために結成した政党は？", "【年表】1900年：伊藤博文が（　）を結成し、のちに西園寺公望や原敬が総裁となった。"], exp: "衆議院の第一党として、長く政党政治の中心となりました。" },
        { type: "term", a: "元老", opts: ["元老", "枢密顧問官", "貴族院議員", "藩閥"], vars: ["山県有朋や伊藤博文など、非公式に天皇を補佐し首相の推薦権を握った重臣を何というか？", "政界の第一線を退いた後も、内閣の背後から影響力を行使した明治維新の功労者たちを何と呼ぶか？"], exp: "彼らの多くは薩摩・長州の出身者でした。" },
        { type: "term", a: "桂園時代", opts: ["桂園時代", "大正デモクラシー", "藩閥政治", "政党内閣時代"], vars: ["明治末期、桂太郎と西園寺公望が交互に政権を担当した安定期を何と呼ぶ？", "【年表】1901年〜：桂太郎と西園寺公望が交代で内閣を組織する（　）が続いた。"], exp: "長州閥の桂と、立憲政友会の西園寺が協力・妥協して政治を行いました。" },
        { type: "term", a: "大逆事件", opts: ["大逆事件", "五・一五事件", "二・二六事件", "血盟団事件"], vars: ["1910年、社会主義者の幸徳秋水らが天皇暗殺を企てたとして処刑された事件は？", "【年表】1910年：社会主義運動弾圧の口実となった（　）が起こり、幸徳秋水らが処刑された。"], exp: "この事件を機に、社会主義運動は「冬の時代」を迎えました。" },
        { type: "term", a: "辛亥革命", opts: ["辛亥革命", "義和団事件", "ロシア革命", "五・四運動"], vars: ["1911年、孫文の三民主義などを指導理念として清朝を倒した革命は？", "【年表】1911年：中国で（　）が起こり、翌年に中華民国が成立した。"], exp: "この革命の影響で、日本の陸軍も朝鮮に駐屯する師団の増設を要求しました。" },
        { type: "term", a: "孫文", opts: ["孫文", "袁世凱", "蔣介石", "毛沢東"], vars: ["三民主義（民族・民権・民生）を唱え、中華民国の臨時大総統となった人物は？", "辛亥革命の中心となり、新しい国家を作ろうとした革命運動の指導者は？"], exp: "中国革命の父と呼ばれます。" },
        { type: "term", a: "袁世凱", opts: ["袁世凱", "孫文", "蔣介石", "段祺瑞"], vars: ["清の皇帝を退位させる代わりに、孫文から中華民国の大総統の地位を譲り受けた人物は？", "辛亥革命後、中華民国の実権を握り独裁政府を作った人物は？"], exp: "彼に対し、日本は第一次世界大戦中に二十一か条の要求を突きつけました。" },
        { type: "term", a: "二個師団", opts: ["二個師団", "一個旅団", "戦艦部隊", "航空隊"], vars: ["1912年、陸軍が朝鮮に駐屯させるために増設を要求し、第2次西園寺内閣を倒す原因となったものは？", "辛亥革命を機に、陸軍が政府に対して強く要求した軍備拡張の内容は？"], exp: "西園寺内閣は財政難を理由にこれを拒否し、総辞職しました。" },
        { type: "term", a: "大正政変", opts: ["大正政変", "昭和維新", "明治維新", "護憲三派内閣"], vars: ["第一次護憲運動によって、第3次桂太郎内閣がわずか50日あまりで退陣した出来事を何というか？", "【年表】1913年：民衆の運動によって桂内閣が倒れる（　）が起こった。"], exp: "民衆の力で内閣を倒した画期的な出来事でした。" },
        { type: "term", a: "第一次護憲運動", opts: ["第一次護憲運動", "第二次護憲運動", "自由民権運動", "普通選挙運動"], vars: ["尾崎行雄や犬養毅らが中心となり、「閥族打破・憲政擁護」を掲げて桂内閣を倒した運動は？", "第3次桂内閣に対し、政党・ジャーナリスト・民衆が展開した内閣打倒運動は？"], exp: "議会政治を守ろうとする大きなうねりとなりました。" },
        { type: "term", a: "シーメンス事件", opts: ["シーメンス事件", "大逆事件", "帝人事件", "ロッキード事件"], vars: ["1914年、外国製の軍艦をめぐる海軍高官の汚職が発覚し、山本権兵衛内閣が総辞職した事件は？", "【年表】1914年：海軍の汚職事件である（　）が発覚し、都市民衆の抗議行動が再び高まった。"], exp: "大正政変に続き、藩閥や軍部に対する国民の不満が爆発しました。" },
        { type: "term", a: "サラエボ事件", opts: ["サラエボ事件", "満州事変", "盧溝橋事件", "柳条湖事件"], vars: ["1914年、オーストリア皇太子夫妻が暗殺され、第一次世界大戦のきっかけとなった事件は？", "【年表】1914年：セルビア人による皇太子暗殺事件である（　）がおこり、第一次大戦が始まった。"], exp: "バルカン半島は民族対立から「ヨーロッパの火薬庫」と呼ばれていました。" },
        { type: "term", a: "日英同盟", opts: ["日英同盟", "日独伊三国同盟", "日露協商", "三国同盟"], vars: ["日本が第一次世界大戦に連合国側で参戦する理由（口実）とした同盟は？", "日本が中国におけるドイツの拠点（青島など）を攻撃する根拠とした条約は？"], exp: "日本はヨーロッパ戦線への派兵は断り、アジアでの権益拡大を図りました。" },
        { type: "term", a: "二十一か条の要求", opts: ["二十一か条の要求", "リットン報告書", "ハル・ノート", "ポツダム宣言"], vars: ["1915年、日本が中国の袁世凱政府に突きつけ、山東省のドイツ権益継承などを認めさせた要求は？", "【年表】1915年：欧州の大戦の隙をつき、日本が中国に対して強硬な（　）を突きつけた。"], exp: "中国の強い反発を招き、のちの五・四運動の原因となりました。" },
        { type: "term", a: "ロシア革命", opts: ["ロシア革命", "辛亥革命", "フランス革命", "名誉革命"], vars: ["1917年、レーニンの指導により世界ではじめての社会主義政権が誕生した革命は？", "【年表】1917年：大戦中、レーニンがひきいるソヴィエト政権が誕生する（　）が起こった。"], exp: "この革命により、ロシアはドイツと単独講和を結び大戦から離脱しました。" },
        { type: "term", a: "シベリア出兵", opts: ["シベリア出兵", "北清事変", "台湾出兵", "満州事変"], vars: ["1918年、ロシア革命の干渉を目的に、日本やアメリカなどが共同で軍隊を派遣した出来事は？", "【年表】1918年：社会主義の拡大を恐れ、日本を含む列国が（　）を行った。"], exp: "この出兵を見越した商人の米買い占めが、米騒動を引き起こしました。" },
        { type: "term", a: "パリ講和会議", opts: ["パリ講和会議", "ワシントン会議", "ウィーン会議", "ロンドン会議"], vars: ["1919年、第一次世界大戦の戦後処理のために開かれた国際会議は？", "アメリカ大統領ウィルソンの平和原則14カ条を講和の基礎として開かれた会議は？"], exp: "ここでベルサイユ条約が結ばれました。" },
        { type: "term", a: "ベルサイユ条約", opts: ["ベルサイユ条約", "ワシントン条約", "ポーツマス条約", "下関条約"], vars: ["パリ講和会議でドイツに対して結ばれた、巨額の賠償金などを課した条約は？", "【年表】1919年：第一次世界大戦の講和条約である（　）が調印された。"], exp: "この条約に基づくヨーロッパの新しい国際秩序をベルサイユ体制と呼びます。" },
        { type: "term", a: "民族自決", opts: ["民族自決", "国民主権", "基本的人権", "大東亜共栄圏"], vars: ["ウィルソンが提唱した、各民族が自らの政治体制を決定するという原則は？", "第一次世界大戦後、東ヨーロッパ諸国が独立する指導原理となった考え方は？"], exp: "この考え方はアジアの民族運動（三・一独立運動など）にも大きな影響を与えました。" },
        { type: "term", a: "国際連盟", opts: ["国際連盟", "国際連合", "国際司法裁判所", "ユネスコ"], vars: ["1920年に発足した、世界初の国際平和維持機関は？", "ウィルソンの提案で設立されたが、提唱国のアメリカが議会の反対で不参加だった国際機関は？"], exp: "日本は常任理事国となりましたが、軍事的制裁の権限がないなどの弱点がありました。" },
        { type: "term", a: "三・一独立運動", opts: ["三・一独立運動", "五・四運動", "義和団事件", "辛亥革命"], vars: ["1919年、朝鮮全土で「独立万歳」を叫んで起こった民族運動は？", "【年表】1919年：民族自決の世論を背景に、朝鮮で（　）が展開された。"], exp: "日本はこれを武力で厳しく弾圧しました。" },
        { type: "term", a: "五・四運動", opts: ["五・四運動", "三・一独立運動", "北伐", "文化大革命"], vars: ["1919年、日本の二十一か条要求の取り消しなどを求めて中国の学生らが起こした運動は？", "【年表】1919年：パリ講和会議での日本の権益要求に反発し、中国で（　）が起こった。"], exp: "反日・反帝国主義の愛国運動として中国全土に広がりました。" },
        { type: "term", a: "ワシントン会議", opts: ["ワシントン会議", "パリ講和会議", "ロンドン会議", "ヤルタ会談"], vars: ["1921年、アメリカの提唱で、海軍軍縮や太平洋・極東問題について話し合うために開かれた会議は？", "【年表】1921年：建艦競争を終わらせるための軍縮会議である（　）が開かれた。"], exp: "この会議で結ばれた条約に基づく国際秩序をワシントン体制と呼びます。" },
        { type: "term", a: "四カ国条約", opts: ["四カ国条約", "九カ国条約", "ベルサイユ条約", "不戦条約"], vars: ["ワシントン会議で結ばれ、太平洋地域の現状維持を約束した条約は？", "この条約が結ばれた結果、同盟の目的を失い廃棄されることになった条約は日英同盟であるが、廃棄を決めた条約名は？"], exp: "米・英・仏・日の間で結ばれました。" },
        { type: "term", a: "九カ国条約", opts: ["九カ国条約", "四カ国条約", "ベルサイユ条約", "日ソ中立条約"], vars: ["ワシントン会議で結ばれ、中国の主権尊重と領土保全を約束した条約は？", "この条約に基づき、日本は山東省の権益を中国へ返還することになった。その条約は？"], exp: "これにより、石井・ランシング協定も廃棄されました。" },
        { type: "term", a: "吉野作造", opts: ["吉野作造", "美濃部達吉", "福沢諭吉", "中江兆民"], vars: ["大正時代、天皇主権のもとでも政治の決定は民衆の意向によるべきだとする「民本主義」を唱えた学者は？", "普通選挙の実施などを主張し、大正デモクラシーの理論的指導者となった東京帝大の教授は？"], exp: "彼の考えは学生や知識人に広く支持されました。" },
        { type: "term", a: "民本主義", opts: ["民本主義", "民主主義", "天皇機関説", "社会主義"], vars: ["吉野作造が提唱した、政治の目的は民衆の福利にあり、決定は民衆の意向によるべきだとする考え方は？", "大正デモクラシーの理念となった、主権の所在（天皇）に関わらず民主的な政治運営を求める思想は？"], exp: "「民主主義」という言葉は天皇主権に反するとされる恐れがあったため、この言葉が使われました。" },

    let currentSessionData = [];
    let currentQuestionIndex = 0;
    let score = 0;

    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initQuiz() {
        score = 0;
        currentQuestionIndex = 0;
        
        // 100問をシャッフル
        currentSessionData = shuffleArray(masterData).map(item => {
            const randVar = item.vars[Math.floor(Math.random() * item.vars.length)];
            const isTimeline = randVar.includes("【年表】");
            return {
                type: item.type,
                a: item.a,
                opts: shuffleArray(item.opts),
                q: randVar,
                exp: item.exp,
                isTimeline: isTimeline
            };
        });

        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';

        renderQuestion();
    }

    function renderQuestion() {
        const qData = currentSessionData[currentQuestionIndex];
        const total = currentSessionData.length;

        // UI更新
        document.getElementById('question-count').innerText = `第 ${currentQuestionIndex + 1} 問 / 全 ${total} 問`;
        document.getElementById('current-score').innerText = `スコア: ${score}`;
        document.getElementById('progress').style.width = `${((currentQuestionIndex) / total) * 100}%`;
        
        const badge = document.getElementById('type-badge');
        if(qData.type === 'year') { badge.innerText = "年号問題"; badge.style.background = "#8e44ad"; }
        else if(qData.type === 'order') { badge.innerText = "並び替え問題"; badge.style.background = "#e67e22"; }
        else if(qData.type === 'tf') { badge.innerText = "正誤判定"; badge.style.background = "#c0392b"; }
        else { badge.innerText = "用語・人物"; badge.style.background = "#3498db"; }

        document.getElementById('timeline-box').style.display = 'none';
        document.getElementById('normal-box').style.display = 'none';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        // クラスの付け替え（長文選択肢対策）
        const optionsDiv = document.getElementById('options');
        optionsDiv.className = 'options' + (qData.type === 'order' || qData.type === 'tf' ? ' list-view' : '');

        // 問題文表示
        if (qData.isTimeline) {
            document.getElementById('timeline-box').style.display = 'flex';
            const match = qData.q.match(/【年表】(\d+年.*?)：(.*)/);
            if(match) {
                document.getElementById('timeline-year').innerText = match[1];
                const eventHtml = match[2].replace("（　）", `<span class="blank-space">[ ？ ]</span>`);
                document.getElementById('timeline-event').innerHTML = eventHtml;
            }
        } else {
            document.getElementById('normal-box').style.display = 'block';
            document.getElementById('question-text').innerText = qData.q;
        }

        // 選択肢表示
        optionsDiv.innerHTML = '';
        qData.opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(btn, opt, qData.a, qData.exp, qData.isTimeline, qData.q);
            optionsDiv.appendChild(btn);
        });
    }

    function handleAnswer(btn, selected, correct, exp, isTimeline, originalQ) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
            b.disabled = true;
            if (b.innerText === correct) b.classList.add('correct');
        });

        if (selected === correct) {
            score++;
            document.getElementById('current-score').innerText = `スコア: ${score}`;
        } else {
            btn.classList.add('wrong');
        }

        if (isTimeline) {
            const match = originalQ.match(/【年表】(\d+年.*?)：(.*)/);
            if(match) {
                const filledHtml = match[2].replace("（　）", `<span style="color:#198754; font-weight:bold;">${correct}</span>`);
                document.getElementById('timeline-event').innerHTML = filledHtml;
            }
        }

        document.getElementById('explanation-text').innerText = exp;
        document.getElementById('explanation').style.display = 'block';
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        nextBtn.innerText = (currentQuestionIndex === currentSessionData.length - 1) ? "結果を見る" : "次の問題へ";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentSessionData.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        document.getElementById('final-score').innerText = `${score} / ${currentSessionData.length}`;
        const feedback = document.getElementById('feedback-text');
        const percentage = (score / currentSessionData.length) * 100;

        if (percentage === 100) {
            feedback.innerText = "全問正解！驚異的な歴史知識です！完璧マスター！！";
            feedback.style.color = "#27ae60";
        } else if (percentage >= 80) {
            feedback.innerText = "素晴らしい！圧倒的な実力です。間違えた部分を復習すれば完璧です。";
            feedback.style.color = "#2980b9";
        } else if (percentage >= 60) {
            feedback.innerText = "よく頑張りました！年号や出来事の順番をもう一度整理してみましょう。";
            feedback.style.color = "#f39c12";
        } else {
            feedback.innerText = "100問お疲れ様です！解説を読んで、一つずつ確実に覚えていきましょう。";
            feedback.style.color = "#e74c3c";
        }
        window.scrollTo(0,0);
    }

    function resetQuiz() {
        window.scrollTo(0,0);
        initQuiz();
    }

    // クイズ初期化
    initQuiz();

</script>
