    let currentSessionData = [];
    let currentQuestionIndex = 0;
    let score = 0;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        score = 0;
        currentQuestionIndex = 0;
        
        // 問題リストをシャッフルし、バリエーションをランダムに選択
        const shuffledMaster = shuffleArray([...masterData]);
        currentSessionData = shuffledMaster.map(item => {
            const randVar = item.vars[Math.floor(Math.random() * item.vars.length)];
            const isTimeline = randVar.includes("【年表】");
            return {
                a: item.a,
                opts: shuffleArray([...item.opts]),
                q: randVar,
                exp: item.exp,
                isTimeline: isTimeline
            };
        });

        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';

        renderQuestion();
    }

    function renderQuestion() {
        const qData = currentSessionData[currentQuestionIndex];
        const total = currentSessionData.length;

        // UIリセット＆更新
        document.getElementById('question-count').innerText = `問題 ${currentQuestionIndex + 1} / ${total}`;
        document.getElementById('current-score').innerText = `スコア: ${score}`;
        document.getElementById('progress').style.width = `${((currentQuestionIndex) / total) * 100}%`;
        
        document.getElementById('timeline-box').style.display = 'none';
        document.getElementById('normal-box').style.display = 'none';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        // 問題文表示（年表 or 通常）
        if (qData.isTimeline) {
            document.getElementById('timeline-box').style.display = 'flex';
            const match = qData.q.match(/【年表】(\d+年.*?)：(.*)/);
            if(match) {
                document.getElementById('timeline-year').innerText = match[1];
                const eventHtml = match[2].replace("（　）", `<span class="blank-space">[ ？ ]</span>`);
                document.getElementById('timeline-event').innerHTML = eventHtml;
            }
        } else {
            document.getElementById('normal-box').style.display = 'block';
            document.getElementById('question-text').innerText = qData.q;
        }

        // 選択肢表示
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        qData.opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(btn, opt, qData.a, qData.exp, qData.isTimeline, qData.q);
            optionsDiv.appendChild(btn);
        });
    }

    function handleAnswer(btn, selected, correct, exp, isTimeline, originalQ) {
        // 全ボタン無効化＆正解表示
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
            b.disabled = true;
            if (b.innerText === correct) b.classList.add('correct');
        });

        if (selected === correct) {
            score++;
            document.getElementById('current-score').innerText = `スコア: ${score}`;
        } else {
            btn.classList.add('wrong');
        }

        // 年表の穴埋め演出
        if (isTimeline) {
            const match = originalQ.match(/【年表】(\d+年.*?)：(.*)/);
            if(match) {
                const filledHtml = match[2].replace("（　）", `<span style="color:#198754; font-weight:bold;">${correct}</span>`);
                document.getElementById('timeline-event').innerHTML = filledHtml;
            }
        }

        // 解説と次へボタン表示
        document.getElementById('explanation-text').innerText = exp;
        document.getElementById('explanation').style.display = 'block';
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        nextBtn.innerText = (currentQuestionIndex === currentSessionData.length - 1) ? "結果を見る" : "次の問題へ";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentSessionData.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        document.getElementById('final-score').innerText = `${score} / ${currentSessionData.length}`;
        const feedback = document.getElementById('feedback-text');
        const percentage = (score / currentSessionData.length) * 100;

        if (percentage === 100) {
            feedback.innerText = "全問正解！完璧です！この時代の歴史はマスターしましたね。";
            feedback.style.color = "#27ae60";
        } else if (percentage >= 80) {
            feedback.innerText = "素晴らしい！あと一歩で満点です。間違えた箇所を確認しましょう。";
            feedback.style.color = "#2980b9";
        } else {
            feedback.innerText = "伸びしろがあります！解説をよく読んで、もう一度挑戦してみましょう。";
            feedback.style.color = "#e67e22";
        }
    }

    function resetQuiz() {
        window.scrollTo(0,0);
        initQuiz();
    }

    // クイズ初期化
    initQuiz();

</script>

</body>
</html>
